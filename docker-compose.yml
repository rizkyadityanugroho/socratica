services:
  # ── WARP proxy bridge ────────────────────────────────────────────
  # Bridges from Docker network to WARP SOCKS5 proxy on host's loopback.
  # WARP binds to 127.0.0.1:40000, so socat relays 40001 → 40000
  # via host networking, making it reachable from Docker containers.
  warp-bridge:
    image: alpine/socat:1.8.0.1
    command: TCP-LISTEN:40001,fork,reuseaddr TCP:127.0.0.1:40000
    network_mode: host
    restart: unless-stopped

  # ── Reverse proxy (auto SSL) ──────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/dist:/var/www/frontend:ro
      - ./deploy/root-index.html:/var/www/root/index.html:ro
      - caddy_data:/data
    depends_on:
      backend:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M

  # ── Express API server ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    expose:
      - "3001"
    env_file: ./backend/.env
    environment:
      - GEMINI_PROXY=socks5://host.docker.internal:40001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health',r=>process.exit(r.statusCode!==200?1:0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  caddy_data:
