<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rizky Aditya Nugroho</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #faf9f7;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container { text-align: center; max-width: 480px; }
    .dot { width: 10px; height: 10px; background: #b8860b; border-radius: 50%; margin: 0 auto 2rem; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: 1.75rem;
      margin-bottom: 1rem;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 0.9rem;
      line-height: 1.7;
      color: #666;
      font-weight: 300;
      margin-bottom: 2.5rem;
    }
    .divider { width: 40px; height: 1px; background: #d0d0d0; margin: 0 auto 2.5rem; }
    .links { display: flex; gap: 2rem; justify-content: center; }
    .links a {
      color: #2c2c2c;
      text-decoration: none;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: color .2s;
    }
    .links a:hover { color: #b8860b; }
    .subdomain { margin-top: 3rem; font-size: 0.75rem; color: #999; letter-spacing: 0.05em; }
    .subdomain a { color: #666; text-decoration: none; }
    .subdomain a:hover { color: #b8860b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="dot"></div>
    <h1>Rizky Aditya Nugroho</h1>
    <p>
      This site is under construction.<br>
      Something thoughtful is taking shape.
    </p>
    <div class="divider"></div>
    <div class="links">
      <a href="https://socratica.rizkyadityanugroho.my.id">Socratica</a>
      <a href="https://github.com/rizkyadityanugroho">GitHub</a>
      <a href="https://linkedin.com/in/rizkyadityanugroho">LinkedIn</a>
    </div>
    <div class="subdomain">
      <a href="https://socratica.rizkyadityanugroho.my.id">↳ socratica.rizkyadityanugroho.my.id</a>
    </div>
  </div>
</body>
</html>
